
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PhotoRank</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f6f4ef;
        --surface: #fbfaf6;
        --surface-2: #ffffff;
        --ink: #14130f;
        --ink-2: #2a2824;
        --muted: #8a877f;
        --muted-2: #b8b5ac;
        --line: #e6e2d8;
        --line-2: #efece4;
        --accent: oklch(0.42 0.06 145);
        --accent-soft: oklch(0.94 0.025 145);
        --warn: oklch(0.62 0.08 60);
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0d0c0a;
        font-family: "Geist", ui-sans-serif, system-ui, -apple-system, sans-serif;
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      * {
        box-sizing: border-box;
      }
      .pr-app {
        height: 100%;
        background: var(--bg);
        color: var(--ink);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        font-feature-settings: "ss01", "cv11";
        padding-top: 54px; /* clear iOS status bar */
        padding-bottom: 28px; /* clear home indicator */
      }
      .pr-scroll {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }
      .pr-scroll::-webkit-scrollbar { width: 0; }

      /* Type */
      .display {
        font-family: "Instrument Serif", "Iowan Old Style", Georgia, serif;
        font-weight: 400;
        letter-spacing: -0.01em;
        line-height: 1;
      }
      .mono {
        font-family: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
        font-feature-settings: "ss01";
      }
      .eyebrow {
        font-family: "Geist Mono", ui-monospace, monospace;
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }

      /* ---------- Screen 1: Upload ---------- */
      .upload-screen {
        padding: 8px 22px 28px;
        display: flex;
        flex-direction: column;
        gap: 28px;
        min-height: 100%;
      }
      .brand-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: 4px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .brand-mark {
        width: 22px;
        height: 22px;
        border-radius: 6px;
        background: var(--ink);
        position: relative;
        display: grid;
        place-items: center;
      }
      .brand-mark::before {
        content: "";
        width: 9px;
        height: 9px;
        border: 1.5px solid var(--bg);
        border-radius: 2px;
        transform: translate(-1px, -1px);
      }
      .brand-mark::after {
        content: "";
        position: absolute;
        width: 9px;
        height: 9px;
        border: 1.5px solid var(--bg);
        border-radius: 2px;
        background: var(--ink);
        transform: translate(2px, 2px);
      }
      .brand-name {
        font-size: 15px;
        font-weight: 500;
        letter-spacing: -0.01em;
      }
      .hero-copy {
        margin-top: 14px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .hero-title {
        font-size: 42px;
        letter-spacing: -0.015em;
        color: var(--ink);
      }
      .hero-title em {
        font-style: italic;
        color: var(--accent);
      }
      .hero-sub {
        font-size: 14px;
        color: var(--muted);
        letter-spacing: -0.005em;
        max-width: 28ch;
      }

      .drop-zone {
        position: relative;
        border: 1.25px dashed var(--muted-2);
        border-radius: 18px;
        background:
          radial-gradient(120% 60% at 50% 0%, rgba(20,19,15,0.025), transparent 60%),
          var(--surface);
        padding: 38px 22px 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s, transform 0.1s;
      }
      .drop-zone:active {
        transform: scale(0.995);
      }
      .drop-zone.dragging {
        border-color: var(--accent);
        background: var(--accent-soft);
      }
      .drop-stack {
        position: relative;
        width: 88px;
        height: 72px;
      }
      .drop-card {
        position: absolute;
        inset: 0;
        background: var(--surface-2);
        border: 1px solid var(--line);
        border-radius: 10px;
        box-shadow: 0 1px 0 rgba(20, 19, 15, 0.03);
      }
      .drop-card:nth-child(1) {
        transform: rotate(-8deg) translate(-12px, 2px);
        background: linear-gradient(135deg, #d9d4c6 0%, #c7c1b2 100%);
      }
      .drop-card:nth-child(2) {
        transform: rotate(4deg) translate(8px, -2px);
        background: linear-gradient(135deg, #e8e2d2 0%, #d6cfba 100%);
      }
      .drop-card:nth-child(3) {
        transform: rotate(-2deg) translate(0, 0);
        background: linear-gradient(135deg, #f2ede0 0%, #e0d9c4 100%);
        border-color: var(--line);
      }
      .drop-title {
        font-size: 17px;
        font-weight: 500;
        letter-spacing: -0.01em;
        color: var(--ink);
      }
      .drop-hint {
        font-size: 12.5px;
        color: var(--muted);
        margin-top: -10px;
      }
      .drop-cta {
        margin-top: 4px;
        background: var(--ink);
        color: var(--bg);
        border: none;
        border-radius: 999px;
        padding: 11px 22px;
        font: inherit;
        font-size: 13.5px;
        font-weight: 500;
        letter-spacing: -0.005em;
        cursor: pointer;
      }

      .profile-section {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .section-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        padding: 0 2px;
      }
      .section-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--ink-2);
        letter-spacing: -0.005em;
      }
      .profile-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .profile-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px 14px 13px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        cursor: pointer;
        text-align: left;
        font: inherit;
        color: inherit;
        transition: border-color 0.15s, background 0.15s;
        position: relative;
      }
      .profile-card[aria-pressed="true"] {
        border-color: var(--ink);
        background: var(--surface-2);
        box-shadow: 0 0 0 1px var(--ink) inset;
      }
      .profile-card[aria-pressed="true"] .profile-dot {
        background: var(--ink);
      }
      .profile-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--muted-2);
        margin-bottom: 6px;
      }
      .profile-name {
        font-size: 14.5px;
        font-weight: 500;
        letter-spacing: -0.005em;
      }
      .profile-desc {
        font-size: 11.5px;
        color: var(--muted);
        line-height: 1.35;
      }

      .footnote {
        margin-top: auto;
        padding-top: 8px;
        font-size: 11px;
        color: var(--muted-2);
        text-align: center;
        letter-spacing: -0.005em;
      }

      /* ---------- Screen 2: Loading ---------- */
      .loading-screen {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 24px 22px 28px;
      }
      .loading-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .loading-back {
        background: transparent;
        border: none;
        font: inherit;
        font-size: 13px;
        color: var(--muted);
        padding: 4px 0;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .loading-center {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        gap: 28px;
      }
      .loading-status {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .loading-eyebrow {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .loading-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        animation: pulse 1.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.35; transform: scale(0.85); }
        50% { opacity: 1; transform: scale(1.15); }
      }
      .loading-title {
        font-size: 38px;
        letter-spacing: -0.015em;
        color: var(--ink);
        line-height: 1.05;
      }
      .loading-title em {
        font-style: italic;
        color: var(--accent);
      }
      .loading-sub {
        font-size: 13.5px;
        color: var(--muted);
        max-width: 30ch;
      }
      .loading-thumbs {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        max-width: 100%;
      }
      .loading-thumb {
        width: 38px;
        height: 38px;
        border-radius: 8px;
        background: var(--surface-2);
        border: 1px solid var(--line);
        position: relative;
        overflow: hidden;
      }
      .loading-thumb::before {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          135deg,
          #e0dac9 0px,
          #e0dac9 4px,
          #ebe5d4 4px,
          #ebe5d4 8px
        );
      }
      .loading-thumb.done::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(20, 19, 15, 0.55);
      }
      .loading-thumb.done .check {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: var(--bg);
        font-size: 13px;
        z-index: 1;
      }
      .loading-stats {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .loading-progress-row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .loading-count {
        font-size: 12px;
        color: var(--ink-2);
      }
      .loading-count .mono {
        font-size: 13px;
      }
      .loading-pct {
        font-size: 12px;
        color: var(--muted);
      }
      .loading-bar {
        height: 3px;
        background: var(--line-2);
        border-radius: 999px;
        overflow: hidden;
      }
      .loading-bar-fill {
        height: 100%;
        background: var(--ink);
        border-radius: 999px;
        transition: width 0.4s ease;
      }
      .loading-stages {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 4px;
      }
      .stage {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 12.5px;
        color: var(--muted);
      }
      .stage.active {
        color: var(--ink);
      }
      .stage.done {
        color: var(--muted);
      }
      .stage-marker {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 1.25px solid var(--muted-2);
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }
      .stage.done .stage-marker {
        background: var(--ink);
        border-color: var(--ink);
        color: var(--bg);
        font-size: 8px;
      }
      .stage.active .stage-marker {
        border-color: var(--ink);
      }
      .stage.active .stage-marker::after {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--ink);
        animation: pulse 1.4s ease-in-out infinite;
      }

      /* ---------- Screen 3: Results ---------- */
      .results-screen {
        padding: 0 0 32px;
      }
      .results-top {
        position: sticky;
        top: 0;
        z-index: 5;
        background: var(--bg);
        padding: 14px 22px 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid transparent;
      }
      .results-top.scrolled {
        border-bottom-color: var(--line);
      }
      .icon-btn {
        background: transparent;
        border: none;
        font: inherit;
        font-size: 13px;
        color: var(--ink-2);
        padding: 4px 0;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .results-meta {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-family: "Geist Mono", monospace;
      }
      .hero-card {
        margin: 6px 22px 0;
        background: var(--surface-2);
        border: 1px solid var(--line);
        border-radius: 22px;
        overflow: hidden;
        box-shadow: 0 1px 0 rgba(20, 19, 15, 0.02), 0 10px 30px -16px rgba(20, 19, 15, 0.18);
      }
      .hero-photo {
        position: relative;
        aspect-ratio: 4 / 5;
        background: #d9d4c6;
        overflow: hidden;
      }
      .hero-photo .placeholder-fill {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(60% 40% at 50% 35%, rgba(255, 252, 240, 0.45), transparent 65%),
          linear-gradient(160deg, #c8c2b1 0%, #a89f88 55%, #7a7363 100%);
      }
      .hero-photo .placeholder-tag {
        position: absolute;
        bottom: 12px;
        left: 12px;
        font-family: "Geist Mono", monospace;
        font-size: 9.5px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.7);
        background: rgba(20, 19, 15, 0.32);
        backdrop-filter: blur(6px);
        padding: 4px 8px;
        border-radius: 4px;
      }
      .hero-rank-badge {
        position: absolute;
        top: 14px;
        left: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(251, 250, 246, 0.92);
        backdrop-filter: blur(8px);
        padding: 6px 12px 6px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .rank-num {
        font-family: "Instrument Serif", serif;
        font-style: italic;
        font-size: 17px;
        line-height: 1;
        color: var(--accent);
        letter-spacing: 0;
        text-transform: none;
        margin-right: 2px;
      }
      .hero-body {
        padding: 22px 22px 22px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .hero-score-row {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
      }
      .hero-score {
        font-size: 76px;
        line-height: 0.9;
        letter-spacing: -0.03em;
        color: var(--ink);
        display: flex;
        align-items: baseline;
      }
      .hero-score .denom {
        font-size: 22px;
        color: var(--muted-2);
        font-style: italic;
        margin-left: 4px;
      }
      .hero-label-stack {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
        text-align: right;
        padding-bottom: 6px;
      }
      .hero-label-stack .eyebrow {
        color: var(--accent);
      }
      .hero-label-stack .label-main {
        font-size: 14px;
        font-weight: 500;
        letter-spacing: -0.005em;
      }
      .hero-note {
        font-family: "Instrument Serif", serif;
        font-size: 21px;
        line-height: 1.25;
        letter-spacing: -0.005em;
        color: var(--ink);
        padding: 14px 0 0;
        border-top: 1px solid var(--line);
      }
      .hero-note::before {
        content: "“";
        font-style: italic;
        color: var(--muted-2);
        margin-right: 2px;
      }
      .hero-note::after {
        content: "”";
        font-style: italic;
        color: var(--muted-2);
        margin-left: 2px;
      }
      .hero-note .by {
        display: block;
        margin-top: 8px;
        font-family: "Geist Mono", monospace;
        font-size: 9.5px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .hero-note .by::before { content: none; }

      .ranked-list-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 28px 22px 10px;
      }
      .ranked-list-head .title {
        font-size: 13px;
        font-weight: 500;
        color: var(--ink-2);
      }
      .ranked-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 0 22px;
      }

      .rank-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 16px;
        overflow: hidden;
        transition: background 0.15s, border-color 0.15s;
      }
      .rank-card.open {
        background: var(--surface-2);
      }
      .rank-row {
        display: grid;
        grid-template-columns: 28px 56px 1fr auto;
        gap: 14px;
        align-items: center;
        padding: 12px 14px;
        cursor: pointer;
        background: transparent;
        border: none;
        width: 100%;
        text-align: left;
        font: inherit;
        color: inherit;
      }
      .rank-pos {
        font-family: "Instrument Serif", serif;
        font-size: 22px;
        line-height: 1;
        color: var(--muted);
        text-align: center;
        font-style: italic;
      }
      .rank-thumb {
        width: 56px;
        height: 56px;
        border-radius: 10px;
        overflow: hidden;
        position: relative;
        background: var(--line);
      }
      .rank-thumb .placeholder-fill {
        position: absolute;
        inset: 0;
      }
      .rank-thumb-1 .placeholder-fill { background: linear-gradient(160deg, #cdb89a 0%, #8a7559 100%); }
      .rank-thumb-2 .placeholder-fill { background: linear-gradient(160deg, #b5c0c3 0%, #6e7d83 100%); }
      .rank-thumb-3 .placeholder-fill { background: linear-gradient(160deg, #d8c5b8 0%, #9e7e6a 100%); }
      .rank-thumb-4 .placeholder-fill { background: linear-gradient(160deg, #c2bca8 0%, #7e7860 100%); }
      .rank-thumb-5 .placeholder-fill { background: linear-gradient(160deg, #d4cabb 0%, #897a64 100%); }
      .rank-thumb-6 .placeholder-fill { background: linear-gradient(160deg, #b0a89a 0%, #6b6253 100%); }

      .rank-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }
      .rank-blurb {
        font-size: 13.5px;
        color: var(--ink);
        line-height: 1.3;
        letter-spacing: -0.005em;
        overflow: hidden;
        text-overflow: ellipsis;
        display: -webkit-box;
        -webkit-line-clamp: 1;
        line-clamp: 1;
        -webkit-box-orient: vertical;
      }
      .rank-sub {
        font-size: 11px;
        color: var(--muted);
        font-family: "Geist Mono", monospace;
        letter-spacing: 0.04em;
      }
      .rank-right {
        display: flex;
        align-items: center;
        gap: 10px;
        padding-right: 2px;
      }
      .rank-score {
        font-family: "Instrument Serif", serif;
        font-size: 28px;
        line-height: 1;
        color: var(--ink);
        letter-spacing: -0.01em;
      }
      .rank-score .denom {
        font-size: 12px;
        color: var(--muted-2);
        font-style: italic;
        margin-left: 1px;
      }
      .chev {
        width: 22px;
        height: 22px;
        display: grid;
        place-items: center;
        color: var(--muted);
        transition: transform 0.2s;
      }
      .rank-card.open .chev {
        transform: rotate(180deg);
        color: var(--ink);
      }

      .breakdown {
        padding: 4px 16px 16px 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        border-top: 1px solid var(--line-2);
        margin-top: 4px;
      }
      .breakdown-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        padding-top: 10px;
      }
      .breakdown-head .eyebrow {
        color: var(--muted);
      }
      .breakdown-total {
        font-size: 11px;
        color: var(--muted);
        font-family: "Geist Mono", monospace;
      }
      .axis {
        display: grid;
        grid-template-columns: 1fr auto;
        column-gap: 12px;
        row-gap: 5px;
        align-items: baseline;
      }
      .axis-name {
        font-size: 13px;
        color: var(--ink);
        font-weight: 500;
        letter-spacing: -0.005em;
      }
      .axis-name .weight {
        margin-left: 8px;
        font-family: "Geist Mono", monospace;
        font-size: 10px;
        font-weight: 400;
        color: var(--muted);
        letter-spacing: 0.04em;
      }
      .axis-vals {
        text-align: right;
        font-family: "Geist Mono", monospace;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.02em;
        white-space: nowrap;
      }
      .axis-vals .raw {
        color: var(--ink-2);
      }
      .axis-vals .sep {
        margin: 0 6px;
        color: var(--muted-2);
      }
      .axis-vals .contrib {
        color: var(--ink);
      }
      .axis-bar-wrap {
        grid-column: 1 / -1;
        height: 4px;
        background: var(--line-2);
        border-radius: 999px;
        overflow: hidden;
        position: relative;
      }
      .axis-bar-cap {
        position: absolute;
        top: 0; bottom: 0;
        background: rgba(20, 19, 15, 0.06);
        border-right: 1px dashed var(--muted-2);
      }
      .axis-bar {
        height: 100%;
        background: var(--ink);
        border-radius: 999px;
        transition: width 0.5s cubic-bezier(0.2, 0.7, 0.2, 1);
      }
      .axis-bar.dim {
        background: var(--muted);
      }

      .breakdown-foot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 4px;
        border-top: 1px solid var(--line-2);
        margin-top: 2px;
      }
      .breakdown-key {
        font-size: 10px;
        color: var(--muted);
        font-family: "Geist Mono", monospace;
        letter-spacing: 0.04em;
      }
      .breakdown-key .dot {
        display: inline-block;
        width: 6px;
        height: 6px;
        background: var(--ink);
        border-radius: 50%;
        margin-right: 5px;
        vertical-align: middle;
        transform: translateY(-1px);
      }

      .results-footer {
        margin: 22px 22px 0;
        display: flex;
        gap: 8px;
      }
      .results-footer button {
        flex: 1;
        font: inherit;
        font-size: 13px;
        font-weight: 500;
        padding: 12px;
        border-radius: 999px;
        cursor: pointer;
        letter-spacing: -0.005em;
      }
      .btn-secondary {
        background: transparent;
        border: 1px solid var(--line);
        color: var(--ink-2);
      }
      .btn-primary {
        background: var(--ink);
        color: var(--bg);
        border: 1px solid var(--ink);
      }

      /* Tiny prev/next jump for the prototype, outside the device */
      .proto-nav {
        position: fixed;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        padding: 6px;
        border-radius: 999px;
        z-index: 30;
        font-family: "Geist Mono", monospace;
      }
      .proto-nav button {
        background: transparent;
        color: rgba(255,255,255,0.7);
        border: none;
        font: inherit;
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 6px 10px;
        border-radius: 999px;
        cursor: pointer;
      }
      .proto-nav button.active {
        background: rgba(255, 255, 255, 0.14);
        color: #fff;
      }
    </style>
  </head>
